<div class="shell">
  <app-header (toggleNav)="navOpen = !navOpen" />

  <div class="shell-body">
    @if (navOpen) {
      <div class="nav-backdrop" (click)="navOpen = false"></div>
    }

    <app-side-nav [open]="navOpen" (closeNav)="navOpen = false" />

    <main class="shell-main">
      <router-outlet />
    </main>
  </div>
</div>
