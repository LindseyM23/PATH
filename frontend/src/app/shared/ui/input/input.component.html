@if (label) {
  <label class="input-label">{{ label }}</label>
}
<div class="input-wrapper" [class.input-wrapper--error]="error">
  @if (prefix) {
    <span class="input-prefix">{{ prefix }}</span>
  }
  <input
    [type]="effectiveType"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="value ?? ''"
    (input)="handleInput($any($event.target).value)"
    (blur)="handleBlur()"
    [attr.inputmode]="type === 'number' ? 'decimal' : null"
  />
  @if (type === 'password') {
    <button
      type="button"
      class="input-visibility-toggle"
      (click)="toggleShowPassword()"
      [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
    >
      <ng-icon [name]="showPassword ? 'lucideEyeOff' : 'lucideEye'" size="18" />
    </button>
  }
</div>
@if (error) {
  <p class="input-error">{{ error }}</p>
}
