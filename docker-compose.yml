services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: path
      POSTGRES_PASSWORD: path
      POSTGRES_DB: path_dev
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U path"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
